<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление - У Ратуши</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
    <script src="admin-panel.js"></script>
</head>
<body id="admin-login-page">
    <div class="login-container" id="login-container">
        <h2>Вход в панель управления</h2>
        <form id="login-form" autocomplete="off">
            <div class="form-group">
                <label for="admin-email">Email</label>
                <input type="email" id="admin-email" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Пароль</label>
                <input type="password" id="admin-password" autocomplete="off" required>
            </div>
            <button type="submit" class="btn-primary">Войти</button>
        </form>
    </div>

    <div id="admin-panel" style="display: none;">
        <header class="admin-header">
            <div class="container header-inner">
                <a href="/" class="logo"><img src="logo.png" alt="У Ратуши">У Ратуши</a>
                <div class="admin-title">Панель управления</div>
                <button id="logout-btn" class="btn-primary">Выйти</button>
            </div>
        </header>

        <div class="admin-content" style="padding-top: 100px;">
            <div class="container">
                <div class="bookings-table-container">
                    <div class="bookings-header">
                        <h2>Бронирования</h2>
                        <button id="add-booking-btn" class="btn-primary">+ Добавить бронь</button>
                    </div>
                    
                    <div class="bookings-filters">
                        <input type="text" id="search-input" placeholder="Поиск по имени, телефону..." style="width: 350px;">
                        <input type="date" id="filter-date">
                        <select id="filter-status">
                            <option value="">Все статусы</option>
                            <option value="new">Новые</option>
                            <option value="confirmed">Подтвержденные</option>
                            <option value="completed">Завершенные</option>
                            <option value="cancelled">Отмененные</option>
                        </select>
                        <button id="clear-filters">Сбросить</button>
                    </div>
                    
                    <div class="bulk-actions">
                        <button id="select-all-btn">Все</button>
                        <button id="bulk-confirm-btn">Подтвердить</button>
                        <button id="bulk-cancel-btn">Отменить</button>
                    </div>
                    
                    <table class="bookings-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="select-all-checkbox" class="booking-checkbox"></th>
                                <th>ID</th>
                                <th>Стол</th>
                                <th>Имя</th>
                                <th>Телефон</th>
                                <th>Дата</th>
                                <th>Время</th>
                                <th>Гости</th>
                                <th>Комментарий</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-tbody"></tbody>
                    </table>
                </div>

                <div class="tables-management">
                    <h3>Управление столиками</h3>
                    <div id="tables-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for add booking -->
    <div id="add-booking-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3>Добавить бронь</h3>
            <form id="add-booking-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="add-table">Столик</label>
                        <select id="add-table" required></select>
                    </div>
                    <div class="form-group">
                        <label for="add-date">Дата</label>
                        <input type="date" id="add-date" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="add-time">Время</label>
                        <select id="add-time" required></select>
                    </div>
                    <div class="form-group">
                        <label for="add-guests">Гости</label>
                        <select id="add-guests" required></select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="add-name">Имя клиента</label>
                    <input type="text" id="add-name" required>
                </div>
                <div class="form-group">
                    <label for="add-phone">Телефон</label>
                    <input type="tel" id="add-phone" required>
                </div>
                <div class="form-group">
                    <label for="add-comment">Комментарий</label>
                    <textarea id="add-comment" rows="2"></textarea>
                </div>
                <button type="submit" class="btn-primary">Добавить бронь</button>
            </form>
        </div>
    </div>

    <script src="admin-panel.js"></script>
</body>
</html>
