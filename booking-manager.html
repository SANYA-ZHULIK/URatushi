<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление - У Ратуши</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
</head>
<body id="admin-login-page">
    <div class="login-container" id="login-container">
        <h2>Вход в панель управления</h2>
        <form id="login-form" autocomplete="off">
            <div class="form-group">
                <label for="admin-email">Email</label>
                <input type="email" id="admin-email" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label for="admin-password">Пароль</label>
                <input type="password" id="admin-password" autocomplete="off" required>
            </div>
            <button type="submit">Войти</button>
        </form>
    </div>

    <div id="admin-panel" style="display: none;">
        <div class="admin-header">
            <div class="container">
                <div class="logo">Панель управления</div>
                <div>
                    <button id="logout-btn">Выйти</button>
                </div>
            </div>
        </div>

        <div class="admin-content">
            <div class="container">
                <div class="bookings-table-container">
                    <h2>Бронирования</h2>
                    
                    <div class="bookings-filters" style="margin-bottom: 1rem; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                        <input type="text" id="search-input" placeholder="Поиск по имени, телефону..." style="padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                        <input type="date" id="filter-date" style="padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                        <select id="filter-status" style="padding: 0.5rem; border-radius: 4px; border: 1px solid #ddd;">
                            <option value="">Все статусы</option>
                            <option value="new">Новые</option>
                            <option value="confirmed">Подтвержденные</option>
                            <option value="completed">Завершенные</option>
                            <option value="cancelled">Отмененные</option>
                        </select>
                        <button id="clear-filters" style="padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid #8b4513; background: white; cursor: pointer;">Сбросить</button>
                    </div>
                    
                    <div class="bulk-actions" style="margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center;">
                        <button id="select-all-btn" style="padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid #8b4513; background: white; cursor: pointer;">Все</button>
                        <button id="bulk-confirm-btn" style="padding: 0.5rem 1rem; border-radius: 4px; border: none; background: #27ae60; color: white; cursor: pointer;">Подтвердить</button>
                        <button id="bulk-cancel-btn" style="padding: 0.5rem 1rem; border-radius: 4px; border: none; background: #e74c3c; color: white; cursor: pointer;">Отменить</button>
                    </div>
                    
                    <table class="bookings-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"><input type="checkbox" id="select-all-checkbox"></th>
                                <th>ID</th>
                                <th>Стол</th>
                                <th>Имя</th>
                                <th>Телефон</th>
                                <th>Дата</th>
                                <th>Время</th>
                                <th>Гости</th>
                                <th>Комментарий</th>
                                <th>Статус</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-tbody"></tbody>
                    </table>
                </div>

                <div class="manual-booking-form">
                    <h3>Добавить бронь</h3>
                    <form id="manual-booking-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="manual-table">Сталик</label>
                                <select id="manual-table" required></select>
                            </div>
                            <div class="form-group">
                                <label for="manual-date">Дата</label>
                                <input type="date" id="manual-date" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="manual-time">Время</label>
                                <select id="manual-time" required></select>
                            </div>
                            <div class="form-group">
                                <label for="manual-guests">Гости</label>
                                <select id="manual-guests" required></select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="manual-name">Имя клиента</label>
                            <input type="text" id="manual-name" required>
                        </div>
                        <div class="form-group">
                            <label for="manual-phone">Телефон</label>
                            <input type="tel" id="manual-phone" required>
                        </div>
                        <div class="form-group">
                            <label for="manual-comment">Комментарий</label>
                            <textarea id="manual-comment" rows="2"></textarea>
                        </div>
                        <button type="submit">Добавить бронь</button>
                    </form>
                </div>

                <div class="tables-management">
                    <h3>Управление столиками</h3>
                    <div id="tables-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-panel.js"></script>
</body>
</html>
